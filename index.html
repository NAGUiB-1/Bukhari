<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>نتيجة مسابقة القرآن الكريم</title>

  <style>
    :root{
      --bg:#f3f6fb; --card:#ffffff; --muted:#64748b; --text:#1e293b;
      --accent:#6366f1; --accent2:#8b5cf6; --bad:#ef4444; --shadow:0 10px 30px rgba(0,0,0,.08); --r:20px;
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body{
      margin:0; font-family:system-ui, Segoe UI, sans-serif;
      background: radial-gradient(1200px 600px at 70% 10%, rgba(99,102,241,.15), transparent 60%), var(--bg);
      color:var(--text); min-height:100vh; padding:14px;
    }
    .wrap{ width:100%; max-width:980px; margin:0 auto; display:grid; grid-template-columns:1fr; gap:16px; }
    .card{ width:100%; border-radius:var(--r); border:1px solid rgba(0,0,0,.06); background:var(--card); box-shadow:var(--shadow); overflow:hidden; }
    .pad{ padding:16px; }
    h1{ margin:0 0 8px; font-size:22px; font-weight:900; }
    .sub{ margin:0; color:var(--muted); font-size:14px; margin-bottom: 10px; }
    
    .row{ display:flex; flex-direction:column; gap:10px; margin-top:10px; }
    
    /* تنسيق خانة الإدخال */
    .input-group { width: 100%; flex: 1; }
    input{ 
      width:100%; padding:15px 16px; border-radius:16px; border:2px solid #e2e8f0; 
      font-size:18px; outline:none; direction: ltr; text-align: right; transition: .3s;
    }
    /* حالة الخطأ */
    input.error {
      border-color: var(--bad) !important;
      background-color: #fff1f2;
    }
    .error-msg {
      color: var(--bad); font-size: 12px; margin-top: 5px; display: none; font-weight: bold;
    }
    input.error + .error-msg { display: block; }

    button{
      width:100%; padding:15px; border-radius:16px; border:0;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff; font-size:15px; font-weight:900; cursor:pointer; transition: .2s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

    .grid{ margin-top:14px; display:grid; gap:12px; }
    .hero{ padding:18px; border-radius:18px; background:#f8fafc; border:1px solid #e2e8f0; text-align:center; }
    .hero-name{ font-size:1rem; font-weight:900; }
    .info-grid{ display:grid; grid-template-columns:1fr; gap:12px; }
    .kv{ padding:14px 16px; border-radius:16px; border:1px solid #e2e8f0; background:#f8fafc; display:flex; align-items:center; justify-content:space-between; }
    .kv.win{ background: linear-gradient(135deg, #dcfce7, #f0fdf4); border-color: #86efac; }
    .kv.no-win{ background: #fff1f2; border-color: #fecaca; }
    .k{ color:var(--muted); font-weight:800; margin-left: 10px; } 
    .v{ font-weight:900; flex:1; text-align: center; }

    @media (min-width:768px){ .wrap{ grid-template-columns:1.05fr .95fr; } .row{ flex-direction:row; align-items: flex-start; } button{ margin-top: 0; min-width:130px; } }
  </style>
</head>
<body>

  <div class="wrap">
    <section class="card pad">
      <h1>نتيجة مسابقة الإمام البخاري بأشمون عام ١٤٤٧هـ</h1>
      <p class="sub">يرجى كتابة الكود بالأرقام الإنجليزية فقط (0-9).</p>
      
      <div class="row">
        <div class="input-group">
          <input id="code" type="text" inputmode="numeric" placeholder="مثال: 1025" maxlength="15" />
          <div class="error-msg">⚠️ خطأ: يرجى كتابة أرقام إنجليزية فقط.</div>
        </div>
        <button id="btn" onclick="search()">بـحـث</button>
      </div>
    </section>

    <section class="card pad">
      <div style="font-weight:900; margin-bottom:10px;">النتيجة :</div>
      <div id="out" style="text-align:center; color:var(--muted); padding:20px; border:1px dashed #e2e8f0; border-radius:16px;">
        ستظهر التفاصيل هنا.
      </div>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxBXPOn16_ZkSrgHwpeYhaueajLq813NS4RP4sZPHNVTsqmsRXyq6XM_TiswWCQRahp/exec";
    
    const codeEl = document.getElementById("code");
    const btnEl = document.getElementById("btn");

    // التحقق من صحة الإدخال لحظياً
    codeEl.addEventListener("input", function() {
      const val = this.value;
      // التحقق هل توجد أي رموز غير الأرقام الإنجليزية 0-9
      const hasError = /[^\d]/.test(val);
      
      if (hasError && val !== "") {
        this.classList.add("error");
        btnEl.disabled = true;
      } else {
        this.classList.remove("error");
        btnEl.disabled = false;
      }
    });

    async function search(){
      const val = codeEl.value.trim();
      const out = document.getElementById("out");

      if (!val) return;
      
      out.innerHTML = "جاري البحث...";

      try {
        const response = await fetch(`${API_URL}?code=${val}`);
        const res = await response.json();

        if (res && res.ok) {
          const score = parseFloat(res.data.grade) || 0;
          let prizeHTML = score >= 70 
            ? `<div class="kv win" style="grid-column: 1 / -1;"><div class="v">له / لها جائزة 🎁</div></div>` 
            : `<div class="kv no-win" style="grid-column: 1 / -1;"><div class="k">الاستحقاق :</div><div class="v">ليس له / ليست لها جائزة 🌹</div></div>`;

          out.innerHTML = `
            <div class="grid">
              <div class="hero"><div class="hero-name">${res.data.name}</div></div>
              <div class="info-grid">
                <div class="kv"><div class="k">الكود :</div><div class="v" style="direction:ltr;">${res.data.code}</div></div>
                <div class="kv"><div class="k">الدرجة :</div><div class="v" style="direction:ltr;">${res.data.grade}</div></div>
                <div class="kv"><div class="k">المستوى :</div><div class="v">${res.data.level}</div></div>
                <div class="kv"><div class="k">السن :</div><div class="v">${res.data.age || '--'}</div></div>
                ${prizeHTML}
              </div>
            </div>`;
        } else {
          out.innerHTML = "❌ رقم الكود غير موجود في السجلات.";
        }
      } catch (e) {
        out.innerHTML = "❌ خطأ في الاتصال بالسيرفر.";
      }
    }
  </script>
</body>
</html>
