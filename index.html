<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>نتيجة المسابقة</title>

  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --muted:#64748b;
      --text:#1e293b;
      --accent:#6366f1;
      --accent2:#8b5cf6;
      --ok:#22c55e;
      --bad:#ef4444;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --r:20px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html{
      width:100%;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
    }

    body{
      margin:0;
      width:100%;
      overflow-x:hidden;
      font-family:system-ui, Segoe UI, Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 70% 10%, rgba(99,102,241,.15), transparent 60%),
        radial-gradient(1000px 600px at 20% 80%, rgba(34,197,94,.10), transparent 55%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:14px;
    }

    .wrap{
      width:100%;
      max-width:980px;
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr;
      gap:16px;
    }

    .card{
      width:100%;
      border-radius:var(--r);
      border:1px solid rgba(0,0,0,.06);
      background:var(--card);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .pad{
      padding:16px;
    }

    h1{
      margin:0 0 8px;
      font-size:22px;
      font-weight:900;
      line-height:1.6;
    }

    .sub{
      margin:0;
      color:var(--muted);
      line-height:1.9;
      font-size:14px;
    }

    .row{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:18px;
    }

    input{
      width:100%;
      min-width:0;
      padding:15px 16px;
      border-radius:16px;
      border:1px solid #e2e8f0;
      background:#ffffff;
      color:var(--text);
      outline:none;
      font-size:16px;
      transition:.2s;
    }

    input::placeholder{
      color:#94a3b8;
    }

    input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(99,102,241,.15);
    }

    button{
      width:100%;
      min-width:0;
      padding:15px 18px;
      border-radius:16px;
      border:0;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      transition:.2s;
      box-shadow:0 10px 25px rgba(99,102,241,.25);
    }

    button:hover{
      transform:translateY(-1px);
    }

    button:disabled{
      opacity:.65;
      cursor:not-allowed;
      transform:none;
    }

    .loader{
      display:none;
      margin-top:12px;
      color:var(--muted);
      font-size:13px;
    }

    .loader.show{
      display:block;
    }

    .topbar{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:10px;
    }

    .title{
      font-weight:900;
      font-size:20px;
    }

    .tiny{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:7px 12px;
      border-radius:999px;
      border:1px solid #e2e8f0;
      color:var(--muted);
      background:#f8fafc;
      white-space:nowrap;
      font-size:12px;
      font-weight:800;
    }

    .badge.ok{
      color:#166534;
      border-color:#bbf7d0;
      background:#dcfce7;
    }

    .badge.bad{
      color:#991b1b;
      border-color:#fecaca;
      background:#fee2e2;
    }

    .empty{
      margin-top:14px;
      padding:18px;
      border-radius:16px;
      border:1px dashed #cbd5f5;
      background:#f8fafc;
      color:var(--muted);
      line-height:1.9;
      text-align:right;
      width:100%;
    }

    .grid{
      margin-top:14px;
      display:grid;
      gap:12px;
      width:100%;
    }

    .hero{
      padding:18px;
      border-radius:18px;
      background:linear-gradient(135deg,#eef2ff,#f5f3ff);
      border:1px solid #e0e7ff;
      width:100%;
    }

    .hero-label{
      color:#6366f1;
      font-size:13px;
      font-weight:800;
      margin-bottom:8px;
    }

    .hero-name{
      font-size:22px;
      font-weight:900;
      line-height:1.6;
      color:#1e293b;
      word-break:break-word;
    }

    .info-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      width:100%;
    }

    .kv{
      padding:14px 16px;
      border-radius:16px;
      border:1px solid #e2e8f0;
      background:#f8fafc;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      width:100%;
      min-width:0;
    }

    .kv.level{
      background:#eff6ff;
      border-color:#bfdbfe;
    }

    .kv.grade{
      
      border-color:#bbf7d0;
    }

    .k{
      color:var(--muted);
      font-weight:800;
      white-space:nowrap;
      flex-shrink:0;
    }

    .v{
      font-weight:900;
      direction:rtl;
      text-align:right;
      flex:1;
      min-width:0;
      word-break:break-word;
    }

    .grade .v{
      font-size:20px;
    }

    .footer-note{
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
      text-align:right;
    }

    @media (min-width:768px){
      body{ padding:24px; }
      .pad{ padding:22px; }
      h1{ font-size:28px; }
      .row{ flex-direction:row; }
      input{ flex:1; }
      button{ width:auto; min-width:130px; }
      .topbar{ flex-direction:row; align-items:center; justify-content:space-between; }
      .info-grid{ grid-template-columns:1fr 1fr; }
      .hero-name{ font-size:26px; }
    }

    @media (min-width:901px){
      .wrap{ grid-template-columns:1.05fr .95fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="pad">
        <h1>نتيجة مسابقة الإمام البخاري بأشمون عام ١٤٤٧هـ</h1>
        <p class="sub">اكتب كود الطالب واضغط على زر البحث لعرض النتيجة بالتفصيل.</p>

        <div class="row">
          <input id="code" placeholder="اكتب الكود... مثل: 1001" autocomplete="off" inputmode="numeric" />
          <button id="btn" onclick="search()">بحث</button>
        </div>

        <div id="loader" class="loader">جاري البحث...</div>
      </div>
    </section>

    <section class="card">
      <div class="pad">
        <div class="topbar">
          <div>
            <div class="title">النتيجة</div>
            <div class="tiny">الاسم • السن • المستوى • الدرجة</div>
          </div>
          <div id="badge" class="badge">في انتظار كود</div>
        </div>

        <div id="out" class="empty">اكتب كود صحيح وستظهر النتيجة هنا.</div>

        <div class="footer-note">تأكد من كتابة الكود بشكل صحيح كما هو مسجل.</div>
      </div>
    </section>
  </div>

  <script>
    const elCode = document.getElementById("code");
    const btn = document.getElementById("btn");
    const out = document.getElementById("out");
    const loader = document.getElementById("loader");
    const badge = document.getElementById("badge");

    // رابط الـ API الخاص بك من جوجل
    const API_URL = "https://script.google.com/macros/s/AKfycbxBXPOn16_ZkSrgHwpeYhaueajLq813NS4RP4sZPHNVTsqmsRXyq6XM_TiswWCQRahp/exec";

    elCode.addEventListener("keydown", (e) => {
      if (e.key === "Enter") search();
    });

    function setLoading(v){
      btn.disabled = v;
      loader.classList.toggle("show", v);
    }

    function setBadge(text, ok = null){
      badge.textContent = text;
      badge.classList.remove("ok", "bad");
      if (ok === true) badge.classList.add("ok");
      if (ok === false) badge.classList.add("bad");
    }

    function esc(s){
      return (s ?? "").toString()
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function render(d){
      out.className = "";
      out.innerHTML = `
        <div class="grid">
          <div class="hero">
            <div class="hero-label">اسم الطالب</div>
            <div class="hero-name">${esc(d.name)}</div>
          </div>

          <div class="info-grid">
            <div class="kv">
              <div class="k">الكود</div>
              <div class="v">${esc(d.code)}</div>
            </div>

            <div class="kv">
              <div class="k">السن</div>
              <div class="v">${esc(d.age)}</div>
            </div>

            <div class="kv level">
              <div class="k">المستوى</div>
              <div class="v">${esc(d.level)}</div>
            </div>

            <div class="kv grade">
              <div class="k">الدرجة</div>
              <div class="v">${esc(d.grade)}</div>
            </div>
          </div>
        </div>
      `;
    }

    async function search(){
      const code = elCode.value.trim();

      if (!code){
        setBadge("اكتب الكود", false);
        out.className = "empty";
        out.innerHTML = "من فضلك اكتب كود الطالب أولاً.";
        return;
      }

      setLoading(true);
      setBadge("جاري البحث...");
      out.className = "empty";
      out.innerHTML = "يرجى الانتظار حتى اكتمال عرض النتيجة...";

      try {
        const response = await fetch(`${API_URL}?code=${encodeURIComponent(code)}`);
        const res = await response.json();

        setLoading(false);

        if (res && res.ok){
          setBadge("تم العثور", true);
          render(res.data);
        } else {
          setBadge("غير موجود", false);
          out.className = "empty";
          out.innerHTML = `❌ ${esc(res?.message || "الكود غير مسجل")}`;
        }
      } catch (err) {
        setLoading(false);
        setBadge("خطأ", false);
        out.className = "empty";
        out.innerHTML = "❌ حدث خطأ في الاتصال بالخادم. تأكد من إعدادات النشر في جوجل.";
      }
    }
  </script>
</body>
</html>
